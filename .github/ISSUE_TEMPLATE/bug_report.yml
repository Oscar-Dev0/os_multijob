name: Bug report
description: Report a reproducible issue so we can fix it faster
labels: ['bug', 'need repro']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out a bug report.
        Please include a minimal repro and the environment details below.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Write a short and concise description of your bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: List the exact steps so we can reproduce it.
      placeholder: |
        1. Start the server with ...
        2. Open the phone app ...
        3. Select job ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, videos, or other context.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant client/server/NUI errors.
      render: shell
      placeholder: |
        client.lua:123: error ...
        nui://... failed to load ...
  - type: input
    id: updated
    attributes:
      label: Current Version
      description: What version of the resource are you currently using?
      placeholder: e.g. v1.3.0, v1.4.0
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      description: Which framework are you using?
      options:
        - ESX
        - QBCore
        - QBX
        - Standalone
    validations:
      required: true
  - type: dropdown
    id: phone
    attributes:
      label: Phone integration
      description: Which phone integration are you using?
      options:
        - lb-phone
        - gks-phone
        - qs-smartphone-pro
        - other
        - none
    validations:
      required: true
  - type: input
    id: phone_custom
    attributes:
      label: If other phone, which one?
      description: Only if you selected "other" above.
  - type: input
    id: custom
    attributes:
      label: Custom Resources
      description: Are you using custom resources? Which ones?
      placeholder: e.g. zdiscord, qb-target
    validations:
      required: true
  - type: input
    id: fxserver
    attributes:
      label: FXServer build
      description: The FXServer artifact/build number.
      placeholder: e.g. 12345 or 6xxx
  - type: input
    id: os
    attributes:
      label: Server OS
      description: The OS where the server is running.
      placeholder: e.g. Windows Server 2019, Ubuntu 22.04
