name: "Release Action"

on:
  push:
    branches:
      - main

jobs:
    release-action:
        name: "Create Release"
        runs-on: "ubuntu-latest"
        steps:
            - name: Get App Token
              uses: actions/create-github-app-token@v1
              id: generate_token
              with:
                app-id: ${{ secrets.APP_ID }}
                private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
                ref: ${{ github.event.repository.default_branch }}
                token: ${{ steps.generate_token.outputs.token }}

            - name: Set release tag
              id: tag_version
              run: echo "tag=v${{ github.run_number }}" >> $GITHUB_OUTPUT

            - name: Create Git Tag
              run: |
                git config user.name "github-actions"
                git config user.email "github-actions@github.com"
                git tag ${{ steps.tag_version.outputs.tag }}
                git push origin ${{ steps.tag_version.outputs.tag }}

            - name: Install ZIP
              run: sudo apt install zip

            - name: Bundle files
              run: |
                rm -rf ./.github ./.vscode ./.git
                shopt -s extglob
                mkdir ./${{ github.event.repository.name }}
                cp -r !(${{ github.event.repository.name }}) ${{ github.event.repository.name }}
                zip -r ./${{ github.event.repository.name }}.zip ./${{ github.event.repository.name }}

            - name: Create Release
              uses: marvinpinto/action-automatic-releases@latest
              with:
                automatic_release_tag: ${{ steps.tag_version.outputs.tag }}
                title: ${{ steps.tag_version.outputs.tag }}
                repo_token: '${{ steps.generate_token.outputs.token }}'
                prerelease: false
                files: ${{ github.event.repository.name }}.zip
